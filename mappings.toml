# MSSQL to MySQL Type Mapping Overrides (OPTIONAL)
#
# This file is optional. Built-in defaults cover all standard MSSQL types.
# Only add entries here to override the defaults for your specific needs.
#
# Format:
#   from_type = "mssql_type"      (must be a valid MSSQL type)
#   to_type   = "mysql_type"      (must be a valid MySQL type)
#   to_type   = "varchar(500)"    (length parsed automatically)
#   to_type   = "decimal(19, 4)"  (precision/scale parsed automatically)
#
# Built-in defaults (what you get without this file):
#   bit/tinyint       -> tinyint
#   smallint          -> smallint
#   int               -> int
#   bigint            -> bigint
#   decimal/numeric   -> decimal (precision/scale from source)
#   money             -> decimal(19, 4)
#   smallmoney        -> decimal(10, 2)
#   float/real        -> float/real
#   char/nchar        -> char (length from source)
#   varchar           -> varchar (length from source, default 255)
#   nvarchar/ntext    -> longtext
#   text              -> text
#   binary            -> binary (length from source)
#   varbinary         -> varbinary (length from source, default 255)
#   image             -> longblob
#   date              -> date
#   datetime/datetime2/smalldatetime/datetimeoffset -> datetime
#   time              -> time
#   timestamp         -> timestamp
#   uniqueidentifier  -> char(36)
#   xml               -> longtext
#
# Example overrides:
#
# [[mappings]]
# from_type = "nvarchar"
# to_type = "varchar(500)"
#
# [[mappings]]
# from_type = "money"
# to_type = "decimal(10, 2)"
